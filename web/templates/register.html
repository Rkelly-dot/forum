<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Forum</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --border-color: #dddddd;
            --input-bg: #f9f9f9;
            --accent: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 360px;
            padding: 40px 20px;
        }

        .header {
            margin-bottom: 32px;
        }

        .brand {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            display: block;
            text-decoration: none;
            color: var(--text-main);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.85rem;
            font-weight: 500;
        }

        input {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-size: 0.95rem;
            background-color: var(--input-bg);
            transition: border-color 0.1s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #fff;
        }

        button {
            margin-top: 8px;
            padding: 12px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background-color: #000;
        }

        .footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border-color);
            font-size: 0.85rem;
            text-align: center;
            color: var(--text-muted);
        }

        a {
            color: var(--text-main);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        a:hover {
            color: var(--accent);
        }

        .error-box {
            background-color: #fff0f0;
            border: 1px solid #ffdcdc;
            color: #c00;
            padding: 10px;
            font-size: 0.85rem;
            border-radius: 4px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/" class="brand">Forum</a>
            <h1>Create account</h1>
            <p class="subtitle">Join the discussion today.</p>
        </div>

        <!-- Placeholder for error messages -->
        <!-- <div class="error-box">Registration failed. Please try again.</div> -->

        <form method="POST" action="/register">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="yourname">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="email@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Minimum 8 characters">
            </div>

            <button type="submit">Create account</button>
        </form>

        <div class="footer">
            Already have an account? <a href="/login">Log in here</a>
        </div>
    </div>
</body>
</html>
